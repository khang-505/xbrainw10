# test-fail-root.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-fail-root
spec:
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      securityContext:
        runAsUser: 0
      containers:
      - name: nginx
        image: nginx:1.21.6