apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-fail-root
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fail-root
  template:
    metadata:
      labels:
        app: fail-root
    spec:
      securityContext:
        runAsUser: 0

      containers:
      - name: nginx
        image: nginx:1.21.6