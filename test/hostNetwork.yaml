# test-fail-hostnetwork.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-fail-hostnetwork
spec:
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      hostNetwork: true
      containers:
      - name: nginx
        image: nginx:1.21.6