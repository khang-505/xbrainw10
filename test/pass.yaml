apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-pass
  namespace: external-secrets
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pass-limits
  template:
    metadata:
      labels:
        app: pass-limits
    spec:
      containers:
      - name: nginx
        image: nginx:1.21.6
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: k8s-db-secret   
              key: DB_PASSWORD
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi