apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: payments-dev-role
  namespace: payments
rules:
- apiGroups: ["", "apps"]
  resources: ["pods", "deployments", "services"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: payments-dev-binding
  namespace: payments
subjects:
- kind: ServiceAccount
  name: default
  namespace: payments
roleRef:
  kind: Role
  name: payments-dev-role
  apiGroup: rbac.authorization.k8s.io