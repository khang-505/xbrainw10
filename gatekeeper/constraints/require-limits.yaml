apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sContainerLimits
metadata:
  name: require-limits
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds:
          - Pod
      - apiGroups: ["apps"]
        kinds:
          - Deployment
          - StatefulSet
          - DaemonSet
          - ReplicaSet
      - apiGroups: ["argoproj.io"]
        kinds:
          - Rollout

  parameters:
    limits:
      - cpu
      - memory