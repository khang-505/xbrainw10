apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8spspnonrootuser
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  crd:
    spec:
      names:
        kind: K8sPSPNonRootUser

  targets:
  - target: admission.k8s.gatekeeper.sh
    rego: |
      package k8spspnonrootuser

      violation[{"msg": msg}] {
        input.review.object.spec.template.spec.securityContext.runAsUser == 0
        msg := sprintf("pod  must not run as root")
      }

      violation[{"msg": msg}] {
       container := input.review.object.spec.template.spec.containers[_]
       container.securityContext.runAsUser == 0
        msg := sprintf("container <%v> in template must not run as root", [container.name])
      }
      